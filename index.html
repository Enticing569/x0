<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-Нолики</title>
    <!-- Официальный SDK для получения данных пользователя из Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background: var(--tg-theme-bg-color, #fff); 
            color: var(--tg-theme-text-color, #000); 
            margin: 0; padding: 20px;
        }
        .board { 
            display: grid; 
            grid-template-columns: repeat(3, 100px); 
            gap: 5px; 
            justify-content: center; 
            margin: 20px auto; 
        }
        .cell { 
            width: 100px; height: 100px; 
            font-size: 3em; 
            background: var(--tg-theme-secondary-bg-color, #eee); 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; 
            border-radius: 8px;
        }
        button { 
            margin-top: 20px; padding: 10px 20px; 
            font-size: 16px; cursor: pointer; 
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #fff);
            border: none; border-radius: 8px;
        }
        ul { list-style: none; padding: 0; }
        li { margin: 5px 0; background: var(--tg-theme-secondary-bg-color, #eee); padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Крестики-Нолики</h1>
    <h2 id="status">Твой ход (X)</h2>
    <div class="board" id="board"></div>
    <button onclick="showLeaderboard()">Топ 10 игроков</button>
    <div id="leaderboard"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const user = tg.initDataUnsafe?.user;
        
        // ВАЖНО: Замените на URL вашего Node.js сервера
        const apiUrl = 'https://ваш-сервер.com/api'; 

        let board = ['', '', '', '', '', '', '', '', ''];
        let active = true;

        const boardEl = document.getElementById('board');
        boardEl.innerHTML = board.map((_, i) => `<div class="cell" onclick="move(${i})"></div>`).join('');
        const cells = document.querySelectorAll('.cell');

        function move(i) {
            if (!active || board[i] !== '') return;
            board[i] = 'X';
            cells[i].innerText = 'X';
            
            if (checkWin('X')) return endGame(1, 'Вы победили! 🏆');
            if (!board.includes('')) return endGame(0, 'Ничья! 🤝');
            
            active = false;
            document.getElementById('status').innerText = 'Ход ИИ...';
            setTimeout(botMove, 500);
        }

        function botMove() {
            let empty = board.map((v, i) => v === '' ? i : null).filter(v => v !== null);
            if (empty.length === 0) return;
            
            // ИИ делает случайный ход
            let move = empty[Math.floor(Math.random() * empty.length)];
            board[move] = 'O';
            cells[move].innerText = 'O';
            
            if (checkWin('O')) return endGame(2, 'Вы проиграли! ❌');
            if (!board.includes('')) return endGame(0, 'Ничья! 🤝');
            
            active = true;
            document.getElementById('status').innerText = 'Твой ход (X)';
        }

        function checkWin(p) {
            const wins = [
                [0,1,2],[3,4,5],[6,7,8], // Горизонтали
                [0,3,6],[1,4,7],[2,5,8], // Вертикали
                [0,4,8],[2,4,6]          // Диагонали
            ];
            return wins.some(w => board[w[0]] === p && board[w[1]] === p && board[w[2]] === p);
        }

        function endGame(res, msg) {
            active = false;
            document.getElementById('status').innerText = msg;
            
            // Отправка результата на сервер
            if (user) {
                fetch(`${apiUrl}/result`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        userId: user.id, 
                        username: user.username || user.first_name, 
                        result: res 
                    })
                }).catch(console.error);
            }
        }

        function showLeaderboard() {
            fetch(`${apiUrl}/leaderboard`)
                .then(r => r.json())
                .then(data => {
                    let html = '<h3>Топ игроков</h3><ul>';
                    data.forEach((u, i) => {
                        html += `<li><b>#${i+1} ${u.username}</b>: ${u.wins} побед, ${u.losses} поражений (${u.played} игр)</li>`;
                    });
                    html += '</ul>';
                    document.getElementById('leaderboard').innerHTML = html;
                }).catch(() => {
                    document.getElementById('leaderboard').innerHTML = '<p>Ошибка загрузки топа</p>';
                });
        }
    </script>
</body>
</html>
